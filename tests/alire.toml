name = "tests"
description = ""
version = "0.1.0-dev"

authors = ["Bent Bracke"]
maintainers = ["Bent Bracke <bent@bracke.dk>"]
maintainers-logins = ["bracke"]
licenses = "MIT"
website = ""
tags = []

executables = ["tests"]

[[depends-on]]
gnat_native = "=15.2.1"

[[depends-on]]
aunit = "^26.0.0"

[[depends-on]]
textrender = "*"

# editor_core withs guikit.gpr now -- it depends on the crate rather than compiling its
# sources -- so the tests root, which builds editor_core, needs it on the project path
# too. It built locally only because a sibling checkout happened to be there.
[[depends-on]]
guikit = "*"

[[depends-on]]
hostkit = "*"

[[pins]]
hostkit = { path = "../../hostkit" }
textrender = { path="../../textrender" }
guikit = { path="../../guikit" }

# Build dependencies in the development profile (-Og) too, not the default release
# (-O3). -O3 is a lot of optimisation for code we are about to run a test suite over,
# and it does not fix a latent bug -- it hides one: it kept an uninitialised read in a
# sibling crate invisible until the profile changed.
[build-profiles]
"*" = "development"
